spring.application.name=ChatApp
server.port=${SERVER_PORT:8080}
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatdb}
spring.datasource.username=${DB_USERNAME:chatadmin}
spring.datasource.password=${DB_PASSWORD:chatpassword123!}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

aws.s3.bucket-name=${S3_BUCKET_NAME:lista5-app-chat-images}
aws.region=${AWS_REGION:us-east-1}
aws.s3.presigned-url-expiration-minutes=${S3_PRESIGNED_URL_EXPIRATION:60}
