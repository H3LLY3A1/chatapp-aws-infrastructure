services:
  backend:
    build:
      context: ./cloud_backend-master/cloud_backend-master
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=ChatApp
      - SERVER_PORT=8080
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
    networks:
      - chat-network

  frontend:
    build:
      context: ./cloud_frontend-master/cloud_frontend-master
      dockerfile: Dockerfile
    container_name: chat-frontend
    ports:
      - "5173:5173"
    environment:
      - PUBLIC_API_BASE_URL=http://localhost:8080
    networks:
      - chat-network
    depends_on:
      - backend

networks:
  chat-network:
    driver: bridge
